name: Nyra CI setup
description: Rust toolchain, cache, and OS dependencies for Nyra CI jobs (run actions/checkout first).

inputs:
  platform:
    description: Runner OS family — macos, windows, or linux
    required: true

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable

    - uses: Swatinem/rust-cache@v2

    - name: Cache Homebrew (macOS)
      if: inputs.platform == 'macos'
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Caches/Homebrew
          /opt/homebrew/Cellar/llvm
          /opt/homebrew/Cellar/sqlite
          /opt/homebrew/Cellar/z3
          /opt/homebrew/Cellar/zlib
          /opt/homebrew/opt/llvm
          /opt/homebrew/opt/sqlite
          /opt/homebrew/opt/z3
          /opt/homebrew/opt/zlib
        key: brew-nyra-macos-${{ hashFiles('.github/workflows/ci.yml', '.github/actions/nyra-ci-setup/action.yml') }}
        restore-keys: |
          brew-nyra-macos-

    - name: System dependencies (macOS)
      if: inputs.platform == 'macos'
      shell: bash
      run: brew install llvm sqlite z3 zlib

    - name: macOS LLVM paths
      if: inputs.platform == 'macos'
      shell: bash
      run: |
        echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"
        echo "DYLD_LIBRARY_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

    - name: Install LLVM (Windows)
      if: inputs.platform == 'windows'
      uses: KyleMayes/install-llvm-action@v2
      with:
        version: "18.1.8"

    - name: System dependencies (Windows)
      if: inputs.platform == 'windows'
      shell: pwsh
      run: |
        choco install zlib -y --no-progress
        $root = "C:\ProgramData\chocolatey\lib\zlib\tools"
        if (-not (Test-Path "$root\include\zlib.h")) {
          $hit = Get-ChildItem "C:\ProgramData\chocolatey\lib\zlib" -Recurse -Filter "zlib.h" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($hit) { $root = $hit.Directory.Parent.FullName }
        }
        "ZLIB_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

    - name: System dependencies (Linux)
      if: inputs.platform == 'linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang lld libclang-dev llvm-dev libsqlite3-dev zlib1g-dev python3
