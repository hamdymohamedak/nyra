name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 0"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Staged CI: build → tier1 (fast) → tier2 (medium) → tier3 (heavy) → native/extras.
# Within each tier, gates run in parallel (matrix). Later tiers still run if an earlier
# tier failed (if: always) so every failure is visible in one run.

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Stage 0: build (macOS ∥ Windows) ─────────────────────────────────────────
  build-macos:
    name: "build · macOS"
    runs-on: macos-latest
    steps:
      - uses: ./.github/actions/nyra-ci-setup
        with:
          platform: macos
      - name: Build workspace + nyra
        shell: bash
        run: make test-platform-ci-build

  build-windows:
    name: "build · Windows"
    runs-on: windows-latest
    steps:
      - uses: ./.github/actions/nyra-ci-setup
        with:
          platform: windows
      - name: Build workspace + nyra
        shell: bash
        run: make test-platform-ci-build

  # ── Tier 1: fast (~1–3 min per gate, parallel) ───────────────────────────────
  tier1-macos:
    name: "tier1 · macOS · ${{ matrix.gate }}"
    needs: build-macos
    runs-on: macos-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        gate:
          - test-optional-types
          - test-conformance
          - test-cargo-workspace
    steps:
      - uses: ./.github/actions/nyra-ci-setup
        with:
          platform: macos
      - name: "make ${{ matrix.gate }}"
        shell: bash
        env:
          NYRA_CI_GATE: ${{ matrix.gate }}
        run: make test-platform-ci-tier1

  tier1-windows:
    name: "tier1 · Windows · ${{ matrix.gate }}"
    needs: build-windows
    runs-on: windows-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        gate:
          - test-optional-types
          - test-conformance
          - test-cargo-workspace
    steps:
      - uses: ./.github/actions/nyra-ci-setup
        with:
          platform: windows
      - name: "make ${{ matrix.gate }}"
        shell: bash
        env:
          NYRA_CI_GATE: ${{ matrix.gate }}
        run: make test-platform-ci-tier1

  # ── Tier 2: medium (~3–10 min, parallel) ─────────────────────────────────────
  tier2-macos:
    name: "tier2 · macOS · ${{ matrix.gate }}"
    needs: [build-macos, tier1-macos]
    if: always() && needs.build-macos.result == 'success' && !cancelled()
    runs-on: macos-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        gate:
          - test-nyra-lang
          - smoke-stdlib-priority
    steps:
      - uses: ./.github/actions/nyra-ci-setup
        with:
          platform: macos
      - name: "make ${{ matrix.gate }}"
        shell: bash
        env:
          NYRA_CI_GATE: ${{ matrix.gate }}
        run: make test-platform-ci-tier2

  tier2-windows:
    name: "tier2 · Windows · ${{ matrix.gate }}"
    needs: [build-windows, tier1-windows]
    if: always() && needs.build-windows.result == 'success' && !cancelled()
    runs-on: windows-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        gate:
          - test-nyra-lang
          - smoke-stdlib-priority
    steps:
      - uses: ./.github/actions/nyra-ci-setup
        with:
          platform: windows
      - name: "make ${{ matrix.gate }}"
        shell: bash
        env:
          NYRA_CI_GATE: ${{ matrix.gate }}
        run: make test-platform-ci-tier2

  # ── Tier 3: heavy (~5–20 min, parallel) ──────────────────────────────────────
  tier3-macos:
    name: "tier3 · macOS · ${{ matrix.gate }}"
    needs: [build-macos, tier2-macos]
    if: always() && needs.build-macos.result == 'success' && !cancelled()
    runs-on: macos-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        gate:
          - smoke-stdlib
          - smoke-stdlib-runtime
          - test-runtime-smoke
    steps:
      - uses: ./.github/actions/nyra-ci-setup
        with:
          platform: macos
      - name: "make ${{ matrix.gate }}"
        shell: bash
        env:
          NYRA_CI_GATE: ${{ matrix.gate }}
        run: make test-platform-ci-tier3

  tier3-windows:
    name: "tier3 · Windows · ${{ matrix.gate }}"
    needs: [build-windows, tier2-windows]
    if: always() && needs.build-windows.result == 'success' && !cancelled()
    runs-on: windows-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        gate:
          - smoke-stdlib
          - smoke-stdlib-runtime
          - test-runtime-smoke
    steps:
      - uses: ./.github/actions/nyra-ci-setup
        with:
          platform: windows
      - name: "make ${{ matrix.gate }}"
        shell: bash
        env:
          NYRA_CI_GATE: ${{ matrix.gate }}
        run: make test-platform-ci-tier3

  # ── Stage 4: native / packaging (parallel after build) ─────────────────────────
  native-macos:
    name: "native · macOS"
    needs: [build-macos, tier3-macos]
    if: always() && needs.build-macos.result == 'success' && !cancelled()
    runs-on: macos-latest
    steps:
      - uses: ./.github/actions/nyra-ci-setup
        with:
          platform: macos
      - name: Native macOS build smoke
        shell: bash
        run: make test-all-macos-native

  native-windows:
    name: "native · Windows"
    needs: [build-windows, tier3-windows]
    if: always() && needs.build-windows.result == 'success' && !cancelled()
    runs-on: windows-latest
    steps:
      - uses: ./.github/actions/nyra-ci-setup
        with:
          platform: windows
      - name: Native Windows build smoke
        shell: bash
        run: make test-all-windows-native

  windows-package:
    name: "package · Windows"
    needs: build-windows
    if: always() && needs.build-windows.result == 'success' && !cancelled()
    runs-on: windows-latest
    steps:
      - uses: ./.github/actions/nyra-ci-setup
        with:
          platform: windows
      - name: Package smoke (Windows asset layout)
        shell: bash
        run: make package-release VERSION=1.1.0-test TRIPLE=x86_64-pc-windows-msvc

  windows-dap:
    name: "dap · Windows"
    needs: build-windows
    if: always() && needs.build-windows.result == 'success' && !cancelled()
    runs-on: windows-latest
    steps:
      - uses: ./.github/actions/nyra-ci-setup
        with:
          platform: windows
      - name: DAP smoke
        run: cargo build -p nyra-dap

  # ── Summary (always) ─────────────────────────────────────────────────────────
  ci-summary:
    name: CI summary
    needs:
      - build-macos
      - build-windows
      - tier1-macos
      - tier1-windows
      - tier2-macos
      - tier2-windows
      - tier3-macos
      - tier3-windows
      - native-macos
      - native-windows
      - windows-package
      - windows-dap
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write job summary
        shell: bash
        env:
          BUILD_MACOS: ${{ needs.build-macos.result }}
          BUILD_WINDOWS: ${{ needs.build-windows.result }}
          TIER1_MACOS: ${{ needs.tier1-macos.result }}
          TIER1_WINDOWS: ${{ needs.tier1-windows.result }}
          TIER2_MACOS: ${{ needs.tier2-macos.result }}
          TIER2_WINDOWS: ${{ needs.tier2-windows.result }}
          TIER3_MACOS: ${{ needs.tier3-macos.result }}
          TIER3_WINDOWS: ${{ needs.tier3-windows.result }}
          NATIVE_MACOS: ${{ needs.native-macos.result }}
          NATIVE_WINDOWS: ${{ needs.native-windows.result }}
          WIN_PACKAGE: ${{ needs.windows-package.result }}
          WIN_DAP: ${{ needs.windows-dap.result }}
        run: |
          icon() { case "$1" in success) echo '✅';; failure) echo '❌';; skipped) echo '⏭️';; *) echo "⚠️ $1";; esac; }
          {
            echo "## CI stages"
            echo ""
            echo "| Stage | macOS | Windows |"
            echo "|-------|-------|---------|"
            echo "| 0 build | $(icon "$BUILD_MACOS") | $(icon "$BUILD_WINDOWS") |"
            echo "| 1 fast | $(icon "$TIER1_MACOS") | $(icon "$TIER1_WINDOWS") |"
            echo "| 2 medium | $(icon "$TIER2_MACOS") | $(icon "$TIER2_WINDOWS") |"
            echo "| 3 heavy | $(icon "$TIER3_MACOS") | $(icon "$TIER3_WINDOWS") |"
            echo "| 4 native | $(icon "$NATIVE_MACOS") | $(icon "$NATIVE_WINDOWS") |"
            echo "| extras | — | package $(icon "$WIN_PACKAGE") · dap $(icon "$WIN_DAP") |"
          } >> "$GITHUB_STEP_SUMMARY"
          failed=0
          for r in "$BUILD_MACOS" "$BUILD_WINDOWS" "$TIER1_MACOS" "$TIER1_WINDOWS" \
                   "$TIER2_MACOS" "$TIER2_WINDOWS" "$TIER3_MACOS" "$TIER3_WINDOWS" \
                   "$NATIVE_MACOS" "$NATIVE_WINDOWS" "$WIN_PACKAGE" "$WIN_DAP"; do
            [[ "$r" == "failure" ]] && failed=1
          done
          exit "$failed"

  benchmark:
    name: make bench (quick)
    runs-on: ubuntu-latest
    needs: ci-summary
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.ci-summary.result == 'success'
    steps:
      - uses: ./.github/actions/nyra-ci-setup
        with:
          platform: linux
      - name: Extra Linux deps (bench)
        shell: bash
        run: sudo apt-get install -y golang nodejs
      - name: Cross-language benchmark (quick subset)
        env:
          BENCH_QUICK: "1"
          BENCH_RUNS: "3"
          BENCH_SKIP_PGO: "1"
          BENCH_LANG_COOLDOWN: "0"
          BENCH_SERVE: "0"
          BENCH_NO_OPEN: "1"
          BENCH_UPDATE_README: "0"
        run: make bench
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            examples/comparison/results/latest.txt
            examples/comparison/results/latest.html
            examples/comparison/results/data.tsv

  fuzz:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: ./.github/actions/nyra-ci-setup
        with:
          platform: linux
      - name: Install nightly
        run: rustup toolchain install nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Regenerate full compiletest profile
        run: make gen-suite-tests GEN_SUITE_ARGS="--profile full"
      - name: Full compiletest suite
        run: cargo test -p compiler suite_ -- --nocapture
      - name: Extended fuzz gate (longer than push CI)
        run: make test-fuzz-nightly
